name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Yap.app
        run: ./build.sh

      - name: Zip app bundle
        run: cd build && zip -r Yap.app.zip Yap.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Yap.app.zip
