name: Tauri Build

on:
  push:
    branches: [main]
    paths:
      - "tauri-app/**"
      - "README.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".github/workflows/tauri-build.yml"
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - "tauri-app/**"
      - "README.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".github/workflows/tauri-build.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            tauri-app/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('tauri-app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: tauri-app/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('tauri-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: npm ci

      - name: Clean previous bundle outputs
        working-directory: tauri-app
        run: |
          node -e "require('fs').rmSync('src-tauri/target/release/bundle', { recursive: true, force: true })"

      - name: Build Tauri app
        working-directory: tauri-app
        run: npx tauri build

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: yap-macos
          path: |
            tauri-app/src-tauri/target/release/bundle/dmg/*.dmg
            tauri-app/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: yap-windows
          path: |
            tauri-app/src-tauri/target/release/bundle/msi/*.msi
            tauri-app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: yap-macos
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: yap-windows
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/macos/**/*.dmg
            artifacts/windows/**/*.msi
            artifacts/windows/**/*.exe
